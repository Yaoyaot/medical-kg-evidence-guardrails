name: validate-anonymous-reproducibility-package

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-lock.txt
      - name: Verify frozen manifests
        run: python scripts/rebuild_repository_manifest.py --check
      - name: Run quick validation
        run: python reproduce_quick.py
      - name: Recompute frozen point estimates
        run: python reproduce_frozen_results.py
      - name: Verify an exported archive without .git
        shell: bash
        run: |
          mkdir -p ../anonymous-export
          git archive HEAD | tar -x -C ../anonymous-export
          cd ../anonymous-export
          python reproduce_quick.py
          python reproduce_frozen_results.py
